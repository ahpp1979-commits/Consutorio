<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bruzzone & Avero — Consultorio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.app{display:flex;height:100vh;max-height:100vh;overflow:hidden}
.sidebar{width:220px;border-right:1px solid #dddbd2;padding:1rem 0;display:flex;flex-direction:column;gap:4px;background:#f0efe9;flex-shrink:0}
.sidebar-header{padding:0 1rem 1rem;border-bottom:1px solid #dddbd2;margin-bottom:4px}
.sidebar-title{font-size:13px;font-weight:700;color:#1a1a18;line-height:1.2}
.sidebar-sub{font-size:11px;color:#888780;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1rem;cursor:pointer;font-size:13px;color:#5f5e5a;transition:background 0.15s;user-select:none}
.nav-item:hover{background:#e8e6df;color:#1a1a18}
.nav-item.active{background:#fff;color:#1a1a18;font-weight:600;border-left:2px solid #3B6D11}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
.topbar{padding:1rem 1.5rem;border-bottom:1px solid #dddbd2;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:16px;font-weight:700;color:#1a1a18}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;border-radius:8px;border:1px solid #dddbd2;background:#fff;color:#1a1a18;transition:background 0.15s}
.btn:hover{background:#f0efe9}
.btn-primary{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-primary:hover{background:#27500A}
.btn-danger{background:#FCEBEB;color:#A32D2D;border-color:#f09595}
.btn-danger:hover{background:#f7c1c1}
.btn-sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.section{display:none}.section.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:#f5f4f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:#888780;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;color:#1a1a18}
.metric-sub{font-size:11px;color:#888780;margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.card{background:#fff;border:1px solid #dddbd2;border-radius:12px;padding:1rem}
.card-title{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:12px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-gray{background:#f0efe9;color:#5f5e5a}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;color:#888780;border-bottom:1px solid #dddbd2;white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid #f0ede6;color:#1a1a18;vertical-align:middle}
.data-table tbody tr:hover td{background:#f8f7f4}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid #dddbd2;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff}
.search-input:focus{outline:none;border-color:#3B6D11}
.filter-btn{padding:5px 14px;border-radius:10px;font-size:12px;cursor:pointer;border:1px solid #dddbd2;background:#f5f4f0;color:#888780;font-family:inherit;font-weight:600}
.filter-btn:hover{background:#e8e6df}
.filter-btn.active{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:#1a1a18}
.form-group{margin-bottom:1rem}
.form-label{font-size:12px;font-weight:600;color:#5f5e5a;margin-bottom:4px;display:block}
.form-control{width:100%;padding:8px 12px;border:1px solid #dddbd2;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff}
.form-control:focus{outline:none;border-color:#3B6D11}
textarea.form-control{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #dddbd2}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.cal-nav button{background:none;border:1px solid #dddbd2;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px;color:#1a1a18;font-family:inherit}
.cal-nav button:hover{background:#f0efe9}
.cal-month-label{font-size:15px;font-weight:700;color:#1a1a18}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:11px;color:#888780;padding:4px 0;font-weight:700}
.cal-day{min-height:80px;border:1px solid #dddbd2;border-radius:6px;padding:6px;cursor:pointer;transition:background 0.1s}
.cal-day:hover{background:#f5f4f0}
.cal-day.other-month{opacity:0.4}
.cal-day.today{border-color:#3B6D11;border-width:2px}
.cal-day.today .cal-num{color:#3B6D11;font-weight:700}
.cal-num{font-size:12px;color:#1a1a18;margin-bottom:3px}
.cal-event{font-size:10px;background:#EAF3DE;color:#3B6D11;border-radius:3px;padding:1px 5px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.cal-event:hover{background:#C0DD97}
.cal-event.psi2{background:#E6F1FB;color:#185FA5}
.cal-event.psi2:hover{background:#b5d4f4}
.detail-tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid #dddbd2}
.detail-tab{padding:8px 16px;font-size:13px;cursor:pointer;color:#888780;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.detail-tab.active{color:#3B6D11;border-bottom-color:#3B6D11;font-weight:600}
.detail-tab-content{display:none}
.detail-tab-content.active{display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item label{font-size:11px;font-weight:600;color:#888780;display:block;margin-bottom:2px}
.info-item p{font-size:13px;color:#1a1a18}
.historial-entry{background:#f8f7f4;border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid #3B6D11}
.historial-date{font-size:11px;color:#888780;margin-bottom:4px}
.historial-text{font-size:13px;color:#1a1a18;line-height:1.5}
.empty-state{text-align:center;padding:3rem 1rem;color:#888780}
.link-box{background:#f5f4f0;border:1px solid #dddbd2;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-top:8px}
.link-url{font-size:12px;color:#3B6D11;flex:1;word-break:break-all;font-family:monospace}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.amount-pos{color:#3B6D11;font-weight:700}
.amount-neg{color:#A32D2D;font-weight:700}
.booking-wrap{max-width:480px;margin:0 auto;padding:2rem 1rem}
.time-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.time-slot{padding:9px;border:1px solid #dddbd2;border-radius:8px;text-align:center;font-size:13px;cursor:pointer;background:#fff;font-family:inherit}
.time-slot:hover{border-color:#3B6D11;background:#EAF3DE;color:#3B6D11}
.time-slot.selected{border-color:#3B6D11;background:#EAF3DE;color:#3B6D11;font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:#888780;font-size:14px;gap:10px}
.spinner{width:20px;height:20px;border:2px solid #dddbd2;border-top-color:#3B6D11;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrYJ9mdU2350sUHHKHnWry5wneSAtxURY",
  authDomain: "avero-bruzzone.firebaseapp.com",
  projectId: "avero-bruzzone",
  storageBucket: "avero-bruzzone.firebasestorage.app",
  messagingSenderId: "331504974147",
  appId: "1:331504974147:web:13b8d977bfe7d3df32d7f6"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// STATE — datos en memoria, sincronizados desde Firestore
window._state = { patients:[], turnos:[], pagos:[], historial:[] };

// SYNC STATUS
function setSyncStatus(ok){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-status');
  if(dot){dot.style.background=ok?'#3B6D11':'#A32D2D';}
  if(lbl){lbl.textContent=ok?'Sincronizado en la nube':'Sin conexión';}
}

// REALTIME LISTENERS — escuchan cambios en tiempo real
function setupListeners(){
  onSnapshot(collection(db,'patients'), snap=>{
    window._state.patients=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus(true);
    if(document.getElementById('patients').classList.contains('active'))renderPatients();
    if(document.getElementById('dashboard').classList.contains('active'))renderDashboard();
  }, ()=>setSyncStatus(false));

  onSnapshot(collection(db,'turnos'), snap=>{
    window._state.turnos=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus(true);
    if(document.getElementById('calendar').classList.contains('active'))renderCalendar();
    if(document.getElementById('dashboard').classList.contains('active'))renderDashboard();
  }, ()=>setSyncStatus(false));

  onSnapshot(collection(db,'pagos'), snap=>{
    window._state.pagos=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus(true);
    if(document.getElementById('payments').classList.contains('active'))renderPayments();
    if(document.getElementById('dashboard').classList.contains('active'))renderDashboard();
  }, ()=>setSyncStatus(false));

  onSnapshot(collection(db,'historial'), snap=>{
    window._state.historial=snap.docs.map(d=>({id:d.id,...d.data()}));
  }, ()=>setSyncStatus(false));
}

// DB HELPERS
window.DB = {
  patients(){ return window._state.patients },
  turnos(){ return window._state.turnos },
  pagos(){ return window._state.pagos },
  historial(){ return window._state.historial },
  async saveDoc(col, obj){
    await setDoc(doc(db, col, obj.id), obj);
  },
  async deleteDoc(col, id){
    await deleteDoc(doc(db, col, id));
  },
};

setupListeners();
window._fbReady = true;
initApp();
</script>

<script>
// UTILS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function initials(n){return(n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()}
const ACOLORS=['#EAF3DE:#3B6D11','#E6F1FB:#185FA5','#FAEEDA:#854F0B','#EEEDFE:#3C3489','#FCEBEB:#A32D2D','#E1F5EE:#0F6E56'];
function ac(i){const c=ACOLORS[i%ACOLORS.length].split(':');return{bg:c[0],tc:c[1]}}
function tod(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return`${parseInt(dd)} ${mn[parseInt(m)-1]} ${y}`}
function fmtMoney(n){return'$'+Number(n||0).toLocaleString('es-AR')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').style.display='flex'}
function closeModal(){document.getElementById('modal-overlay').style.display='none'}
function closeModalBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal()}

// PATIENTS
function openPatientModal(id){
  const ps=window.DB?window.DB.patients():[];const p=id?ps.find(x=>x.id===id):{};
  openModal(`<div class="modal-title">${id?'Editar paciente':'Nuevo paciente'}</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-control" id="f-name" value="${p.name||''}" placeholder="Ej: Martina Rodríguez"/></div>
    <div class="form-group"><label class="form-label">Fecha de nacimiento</label><input class="form-control" type="date" id="f-dob" value="${p.dob||''}"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Teléfono</label><input class="form-control" id="f-phone" value="${p.phone||''}" placeholder="+598 99 000 000"/></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" value="${p.email||''}" placeholder="correo@email.com"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Psicóloga asignada</label>
      <select class="form-control" id="f-psi">
        <option value="Psic. Mariana Bruzzone" ${(p.psi||'')==='Psic. Mariana Bruzzone'?'selected':''}>Psic. Mariana Bruzzone</option>
        <option value="Lic. Natalia Avero" ${(p.psi||'')==='Lic. Natalia Avero'?'selected':''}>Lic. Natalia Avero</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Estado</label>
      <select class="form-control" id="f-status">
        ${['Activo','Nuevo','Alta','Pausado'].map(s=>`<option ${(p.status||'Activo')===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="form-group"><label class="form-label">Diagnóstico / Motivo de consulta</label><input class="form-control" id="f-dx" value="${p.dx||''}" placeholder="Ej: Ansiedad generalizada"/></div>
  <div class="form-group"><label class="form-label">Notas iniciales</label><textarea class="form-control" id="f-notes">${p.notes||''}</textarea></div>
  <div class="modal-actions">
    ${id?`<button class="btn btn-danger btn-sm" onclick="deletePatient('${id}')">Eliminar</button>`:''}

// CALENDAR
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function renderCalendar(){
  const turnos=window.DB.turnos();const first=new Date(calYear,calMonth,1).getDay();
  const last=new Date(calYear,calMonth+1,0).getDate();const prevLast=new Date(calYear,calMonth,0).getDate();
  const todayStr=tod();let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-day other-month"><div class="cal-num">${prevLast-first+1+i}</div></div>`;
  for(let d=1;d<=last;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const dt=turnos.filter(t=>t.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    cells+=`<div class="cal-day ${isToday?'today':''}" onclick="openTurnoModal('',null,'${ds}')"><div class="cal-num">${d}</div>${dt.map(t=>`<div class="cal-event ${t.psi&&t.psi.includes('Natalia')?'psi2':''}" onclick="event.stopPropagation();openTurnoDetail('${t.id}')">${t.time||''} ${t.patientName||''}</div>`).join('')}</div>`;
  }
  const rem=(7-((first+last)%7))%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other-month"><div class="cal-num">${i}</div></div>`;
  document.getElementById('calendar-content').innerHTML=`
  <div class="cal-nav">
    <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()">&#8249;</button>
    <span class="cal-month-label">${MONTHS[calMonth]} ${calYear}</span>
    <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()">&#8250;</button>
  </div>
  <div class="cal-grid">${DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}${cells}</div>
  <div style="display:flex;gap:14px;margin-top:12px;font-size:12px;color:#888780">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:10px;background:#EAF3DE;border-radius:2px;display:inline-block"></span>Psic. Mariana</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:10px;background:#E6F1FB;border-radius:2px;display:inline-block"></span>Lic. Natalia</span>
  </div>`;
}

    <div class="metric"><div class="metric-label">Pendiente de cobro</div><div class="metric-value" style="font-size:17px;color:#A32D2D">${fmtMoney(pendiente)}</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Sesiones de hoy</div>
      ${todayTurnos.length===0?`<div style="text-align:center;padding:1.5rem 0;color:#888780;font-size:13px">No hay turnos para hoy</div>`:
        todayTurnos.map(t=>{const pi=ps.findIndex(p=>p.id===t.patientId);const c=ac(pi>=0?pi:0);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede6">
          <div style="font-size:12px;color:#888780;min-width:44px">${t.time||'—'}</div>
          <div class="avatar" style="background:${c.bg};color:${c.tc}">${initials(t.patientName||'?')}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${t.patientName||'—'}</div><div style="font-size:11px;color:#888780">${t.type||'Sesión'}</div></div>
          ${sb(t.status)}
        </div>`;}).join('')}
    </div>
    <div class="card"><div class="card-title">Últimos pagos</div>
      ${recentPagos.length===0?`<div style="text-align:center;padding:1.5rem 0;color:#888780;font-size:13px">Sin pagos registrados</div>`:
        recentPagos.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede6">
          <div><div style="font-size:13px;font-weight:600">${p.patientName||'—'}</div><div style="font-size:11px;color:#888780">${fmtDate(p.date)}</div></div>
          <div class="${p.status==='cobrado'?'amount-pos':'amount-neg'}">${fmtMoney(p.amount)}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

// CONFIG
function getConfig(){try{return JSON.parse(localStorage.getItem('ba_config'))||{dias:[1,2,3,4,5],horaInicio:'09:00',horaFin:'18:00',duracion:50,descanso:10}}catch{return{dias:[1,2,3,4,5],horaInicio:'09:00',horaFin:'18:00',duracion:50,descanso:10}}}
function getSlots(){
  const cfg=getConfig();const slots=[];
  const[sh,sm]=cfg.horaInicio.split(':').map(Number);const[eh,em]=cfg.horaFin.split(':').map(Number);
  let cur=sh*60+sm;const end=eh*60+em;const step=cfg.duracion+cfg.descanso;
  while(cur+cfg.duracion<=end){slots.push(`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`);cur+=step;}
  return slots;
}
function saveConfig(){
  const dias=[];document.querySelectorAll('.dia-check:checked').forEach(cb=>dias.push(Number(cb.value)));
  if(dias.length===0){alert('Seleccioná al menos un día');return}
  const cfg={dias,horaInicio:document.getElementById('cfg-inicio').value,horaFin:document.getElementById('cfg-fin').value,duracion:Number(document.getElementById('cfg-dur').value),descanso:Number(document.getElementById('cfg-desc').value)};
  localStorage.setItem('ba_config',JSON.stringify(cfg));toast('Configuración guardada ✓');renderConfig();
}
function renderConfig(){
  const cfg=getConfig();const slots=getSlots();
  const diasNombres=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('config-content').innerHTML=`<div style="max-width:560px">
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Días de atención</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[1,2,3,4,5,6,0].map(d=>`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;background:${cfg.dias.includes(d)?'#EAF3DE':'#f5f4f0'};border:1px solid ${cfg.dias.includes(d)?'#97C459':'#dddbd2'};border-radius:8px;padding:7px 12px;color:${cfg.dias.includes(d)?'#3B6D11':'#5f5e5a'}">
        <input type="checkbox" class="dia-check" value="${d}" ${cfg.dias.includes(d)?'checked':''} style="accent-color:#3B6D11"/>${diasNombres[d]}</label>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Horario de atención</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Hora de inicio</label><input class="form-control" type="time" id="cfg-inicio" value="${cfg.horaInicio}"/></div>
      <div class="form-group"><label class="form-label">Hora de fin</label><input class="form-control" type="time" id="cfg-fin" value="${cfg.horaFin}"/></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Duración de turnos</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Duración de sesión (min)</label><input class="form-control" type="number" id="cfg-dur" value="${cfg.duracion}" min="15" max="120"/></div>
      <div class="form-group"><label class="form-label">Descanso entre turnos (min)</label><input class="form-control" type="number" id="cfg-desc" value="${cfg.descanso}" min="0" max="60"/></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:1.5rem"><div class="card-title">Horarios disponibles para pacientes</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${slots.length===0?'<span style="font-size:13px;color:#888780">Ninguno — revisá la configuración</span>':
        slots.map(s=>`<span style="background:#EAF3DE;color:#3B6D11;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600">${s}</span>`).join('')}
    </div>
  </div>
  <button class="btn btn-primary" onclick="saveConfig()" style="width:100%;padding:10px">Guardar configuración</button>
  </div>`;
}

// BOOKING PAGE
var _bSlot='';
function selectBookingSlot(s){_bSlot=s;document.querySelectorAll('.time-slot').forEach(b=>b.classList.toggle('selected',b.dataset.slot===s))}
async function submitBooking(){
  const name=document.getElementById('b-name').value.trim();
  const phone=document.getElementById('b-phone').value.trim();
  const date=document.getElementById('b-date').value;
  if(!name||!phone||!date||!_bSlot){alert('Completá todos los campos obligatorios y elegí un horario');return}
  const psi=document.getElementById('b-psi').value;
  const reason=document.getElementById('b-reason').value.trim();
  const btn=document.querySelector('#booking-inner .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}
  try{
    // Save patient if new
    const ps=window.DB.patients();
    let pat=ps.find(p=>(p.name||'').toLowerCase()===name.toLowerCase());
    if(!pat){
      pat={id:uid(),name,phone,psi:psi==='Sin preferencia'?'':psi,status:'Nuevo',dx:reason,createdAt:tod(),notes:'Solicitó turno online'};
      await window.DB.saveDoc('patients', pat);
    }
    // Save turno
    const turno={id:uid(),patientId:pat.id,patientName:name,date,time:_bSlot,type:'Terapia individual',psi:psi==='Sin preferencia'?'':psi,status:'Pendiente',notes:reason?`Motivo: ${reason}`:''};
    await window.DB.saveDoc('turnos', turno);
    // Show success
    document.getElementById('booking-inner').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem">
      <div style="width:44px;height:44px;border-radius:12px;background:#3B6D11;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:12px;font-weight:700;color:#fff;line-height:1.2">MB</span>
        <span style="font-size:9px;font-weight:600;color:#c0dd97;line-height:1.2">NA</span>
      </div>
      <div><div style="font-size:16px;font-weight:700">Bruzzone & Avero</div><div style="font-size:12px;color:#888780">Consultorio de psicología</div></div>
    </div>
    <div style="text-align:center;padding:2rem 0">
      <div style="width:64px;height:64px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;color:#3B6D11">&#10003;</div>
      <div style="font-size:22px;font-weight:700;margin-bottom:0.5rem">¡Solicitud enviada!</div>
      <p style="font-size:14px;color:#5f5e5a;line-height:1.6;margin-bottom:1.5rem">Tu solicitud fue recibida. El consultorio te confirmará la cita a la brevedad.</p>
      <div style="background:#EAF3DE;border-radius:10px;padding:1rem;text-align:left;font-size:13px;margin-bottom:1.5rem">
        <div style="margin-bottom:4px"><strong>Nombre:</strong> ${name}</div>
        <div style="margin-bottom:4px"><strong>Fecha:</strong> ${fmtDate(date)}</div>
        <div><strong>Horario solicitado:</strong> ${_bSlot}</div>
      </div>
      <button class="btn" onclick="_bSlot='';renderBookingPage()">Solicitar otro turno</button>
    </div>`;
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Confirmar solicitud de turno';}
    alert('Error al enviar. Verificá tu conexión e intentá de nuevo.');
  }
}
function updateBookingSlots(){
  const dateInput=document.getElementById('b-date');const wrap=document.getElementById('b-slots-wrap');
  if(!dateInput||!wrap)return;const val=dateInput.value;
  if(!val){wrap.innerHTML='<p style="font-size:12px;color:#888780">Seleccioná una fecha para ver los horarios.</p>';return}
  const cfg=getConfig();const dow=new Date(val+'T12:00:00').getDay();
  if(!cfg.dias.includes(dow)){wrap.innerHTML='<p style="font-size:13px;color:#A32D2D;font-weight:600">El consultorio no atiende ese día. Por favor elegí otra fecha.</p>';_bSlot='';return}
  const slots=getSlots();
  if(slots.length===0){wrap.innerHTML='<p style="font-size:12px;color:#888780">No hay horarios configurados aún.</p>';return}
  wrap.innerHTML=`<div class="time-slots">${slots.map(s=>`<button class="time-slot${_bSlot===s?' selected':''}" data-slot="${s}" onclick="selectBookingSlot('${s}')">${s}</button>`).join('')}</div>`;
}
function renderBookingPage(){
  document.getElementById('main-app').style.display='none';
  document.getElementById('booking-page').style.display='block';
  _bSlot='';
  document.getElementById('booking-inner').innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:2rem">
    <div style="width:44px;height:44px;border-radius:12px;background:#3B6D11;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <span style="font-size:12px;font-weight:700;color:#fff;line-height:1.2">MB</span>
      <span style="font-size:9px;font-weight:600;color:#c0dd97;line-height:1.2">NA</span>
    </div>
    <div><div style="font-size:16px;font-weight:700">Bruzzone & Avero</div><div style="font-size:12px;color:#888780">Consultorio de psicología</div></div>
  </div>
  <div style="font-size:20px;font-weight:700;margin-bottom:0.4rem">Solicitá tu turno</div>
  <div style="font-size:14px;color:#888780;margin-bottom:1.5rem">Completá tus datos y elegí un horario disponible.</div>
  <div class="form-group"><label class="form-label">Tu nombre completo *</label><input class="form-control" id="b-name" placeholder="Ej: Sofía González"/></div>
  <div class="form-group"><label class="form-label">Teléfono *</label><input class="form-control" id="b-phone" placeholder="+598 99 000 000"/></div>
  <div class="form-group"><label class="form-label">Fecha deseada *</label><input class="form-control" type="date" id="b-date" value="${tod()}" min="${tod()}"/></div>
  <div class="form-group"><label class="form-label">Psicóloga preferida</label>
    <select class="form-control" id="b-psi"><option>Sin preferencia</option><option>Psic. Mariana Bruzzone</option><option>Lic. Natalia Avero</option></select>
  </div>
  <div class="form-group"><label class="form-label">Motivo de consulta (opcional)</label><textarea class="form-control" id="b-reason" placeholder="Podés contarnos brevemente..."></textarea></div>
  <div class="form-group"><label class="form-label">Elegí un horario *</label><div id="b-slots-wrap"><p style="font-size:12px;color:#888780">Seleccioná una fecha para ver los horarios disponibles.</p></div></div>
  <button class="btn btn-primary" style="width:100%;margin-top:1rem;padding:12px" onclick="submitBooking()">Confirmar solicitud de turno</button>`;
  document.getElementById('b-date').addEventListener('change',updateBookingSlots);
  updateBookingSlots();
}

// NAV
function showSection(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el)el.classList.add('active');
  if(id==='dashboard')renderDashboard();
  if(id==='patients')renderPatients();
  if(id==='calendar')renderCalendar();
  if(id==='payments')renderPayments();
  if(id==='config')renderConfig();
}

function initApp(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('booking')==='1'){
    renderBookingPage();
  }else{
    const d=new Date();
    const dn=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const mn=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const lbl=document.getElementById('today-label');
    if(lbl)lbl.textContent=`${dn[d.getDay()]} ${d.getDate()} de ${mn[d.getMonth()]}, ${d.getFullYear()}`;
  }
}
</script>
